  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* thai */\n@font-face {\n  font-family: 'Prompt';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"065e001b-0297-4b3a-8efa-c71358a3c08b\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Prompt';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"18053cc7-8ce3-4c8b-be72-037c88fc5471\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Prompt';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e2a0b056-f5bf-4f18-9bda-462e86996b09\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Prompt';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3d12db01-264f-411c-a328-c5a08d7f7103\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ══════════════════════════════════════════\n   SFwD Youth Skills Explorer — main stylesheet\n══════════════════════════════════════════ */\n\n:root{\n  --bg:#F5F1E8;\n  --surface:#FFFFFF;\n  --ink:#1A1A18;\n  --ink-2:#555551;\n  --ink-3:#98968D;\n  --line:#E8E3D5;\n  --line-2:#F0EBDD;\n\n  --c-red:#E54B2A;\n  --c-red-soft:#FCE4DD;\n  --c-blue:#3560C7;\n  --c-blue-soft:#DCE5F8;\n  --c-green:#5BA84C;\n  --c-green-soft:#DDEFD8;\n  --c-yellow:#F4C526;\n  --c-yellow-soft:#FBEFC5;\n\n  --shadow-sm:0 2px 0 rgba(26,26,24,.08);\n  --shadow-md:0 4px 0 rgba(26,26,24,.1);\n  --shadow-lg:0 6px 0 rgba(26,26,24,.12);\n  --shadow-xl:0 8px 24px rgba(26,26,24,.08);\n\n  --r-sm:10px;\n  --r-md:16px;\n  --r-lg:24px;\n  --r-xl:32px;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}\nhtml,body{background:var(--bg);color:var(--ink);font-family:'Prompt','Noto Sans Thai',system-ui,-apple-system,sans-serif;font-weight:500;line-height:1.5;min-height:100vh}\n\nbutton{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}\na{color:inherit;text-decoration:none}\n\n/* ── layout ── */\n.app{max-width:1200px;margin:0 auto;padding:16px;min-height:100vh}\n\n/* ── top bar ── */\n.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding:10px 14px;background:var(--surface);border:2px solid var(--ink);border-radius:100px;box-shadow:var(--shadow-md)}\n.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}\n.nav-logo{width:32px;height:32px;border-radius:50%;background:var(--c-yellow);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}\n.nav-actions{display:flex;gap:6px;align-items:center}\n.nav-btn{padding:7px 14px;font-size:12.5px;font-weight:600;border-radius:100px;border:2px solid var(--ink);background:var(--surface);transition:transform .1s}\n.nav-btn:hover{transform:translateY(-1px)}\n.nav-btn.primary{background:var(--c-yellow)}\n\n/* level pill */\n.lvl-pill{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 6px;background:var(--c-yellow);border:2px solid var(--ink);border-radius:100px;font-weight:700;font-size:12px}\n.lvl-badge{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--c-yellow);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}\n\n/* ── screen transitions ── */\n.screen{display:none;animation:fadeIn .3s ease}\n.screen.active{display:block}\n@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n\n/* ══════════════════════════════════════════\n   INTRO / HOME\n══════════════════════════════════════════ */\n.hero{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-xl);padding:40px 28px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);margin-bottom:18px}\n.hero-grid{display:grid;grid-template-columns:1fr;gap:24px;align-items:center;position:relative;z-index:1}\n@media(min-width:820px){.hero-grid{grid-template-columns:1.1fr 1fr;gap:32px}.hero{padding:56px 48px}}\n\n.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--c-yellow);border:2px solid var(--ink);padding:5px 12px;border-radius:100px;font-weight:700;font-size:12px;margin-bottom:18px}\n.hero-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--c-red);animation:pulse 1.4s infinite}\n@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}\n\n.hero h1{font-size:clamp(28px,5vw,42px);font-weight:800;line-height:1.15;margin-bottom:16px;letter-spacing:-.02em}\n.hero h1 .hl{background:var(--c-yellow);padding:0 8px;border-radius:6px;box-decoration-break:clone;-webkit-box-decoration-break:clone}\n.hero-sub{font-size:15px;color:var(--ink-2);line-height:1.65;margin-bottom:24px;max-width:460px}\n.hero-cta{display:flex;flex-wrap:wrap;gap:10px;align-items:center}\n\n/* Big pill button */\n.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;font-size:15px;font-weight:700;border-radius:100px;border:2.5px solid var(--ink);background:var(--surface);box-shadow:var(--shadow-md);transition:all .15s}\n.btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}\n.btn:active{transform:translateY(0);box-shadow:var(--shadow-sm)}\n.btn.primary{background:var(--c-red);color:#fff}\n.btn.yellow{background:var(--c-yellow)}\n.btn.green{background:var(--c-green);color:#fff}\n.btn.blue{background:var(--c-blue);color:#fff}\n.btn.ghost{background:transparent;box-shadow:none;border-color:var(--ink);padding:10px 18px}\n.btn.ghost:hover{background:var(--surface)}\n.btn.small{padding:9px 16px;font-size:13px}\n.btn.tiny{padding:6px 12px;font-size:12px;border-width:2px}\n.btn.block{width:100%;justify-content:center}\n.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:var(--shadow-sm)!important}\n\n/* Hero character parade */\n.hero-parade{display:flex;justify-content:center;align-items:flex-end;gap:4px;flex-wrap:wrap;padding:0 10px}\n.hero-parade .c-wrap{animation:bob 3s ease-in-out infinite}\n.hero-parade .c-wrap:nth-child(2){animation-delay:.15s}\n.hero-parade .c-wrap:nth-child(3){animation-delay:.3s}\n.hero-parade .c-wrap:nth-child(4){animation-delay:.45s}\n.hero-parade .c-wrap:nth-child(5){animation-delay:.6s}\n@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}\n\n/* stats strip */\n.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}\n@media(min-width:620px){.stats{grid-template-columns:repeat(4,1fr)}}\n.stat{background:var(--surface);border:2px solid var(--ink);border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--shadow-sm)}\n.stat-big{font-size:24px;font-weight:800;line-height:1;margin-bottom:4px;letter-spacing:-.02em}\n.stat-lbl{font-size:11.5px;color:var(--ink-2);font-weight:600}\n.stat:nth-child(1) .stat-big{color:var(--c-red)}\n.stat:nth-child(2) .stat-big{color:var(--c-blue)}\n.stat:nth-child(3) .stat-big{color:var(--c-green)}\n.stat:nth-child(4) .stat-big{color:var(--c-yellow);-webkit-text-stroke:1.5px var(--ink)}\n\n/* how-it-works */\n.section-title{font-size:22px;font-weight:800;margin-bottom:14px;letter-spacing:-.01em}\n.section-sub{font-size:13.5px;color:var(--ink-2);margin-bottom:18px;max-width:540px;line-height:1.6}\n\n.steps{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px}\n@media(min-width:680px){.steps{grid-template-columns:repeat(3,1fr)}}\n.step{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-md);padding:20px;box-shadow:var(--shadow-md);position:relative}\n.step-num{position:absolute;top:-14px;left:18px;width:32px;height:32px;border-radius:50%;background:var(--c-yellow);border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}\n.step-icon{font-size:30px;margin:4px 0 10px;display:block}\n.step h3{font-size:15px;font-weight:800;margin-bottom:6px}\n.step p{font-size:13px;color:var(--ink-2);line-height:1.6}\n\n/* Char gallery */\n.char-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}\n@media(min-width:540px){.char-gallery{grid-template-columns:repeat(4,1fr)}}\n@media(min-width:900px){.char-gallery{grid-template-columns:repeat(8,1fr)}}\n.char-mini{background:var(--surface);border:2px solid var(--ink);border-radius:var(--r-md);padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm);transition:transform .15s}\n.char-mini:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.char-mini .cm-name{font-size:11px;font-weight:700;margin-top:4px;line-height:1.25}\n\n/* ══════════════════════════════════════════\n   QUIZ\n══════════════════════════════════════════ */\n.quiz-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}\n.prog-bar{flex:1;height:10px;background:var(--surface);border:2px solid var(--ink);border-radius:100px;overflow:hidden;box-shadow:var(--shadow-sm)}\n.prog-fill{height:100%;background:var(--c-red);border-right:2px solid var(--ink);transition:width .4s cubic-bezier(.4,0,.2,1);position:relative}\n.prog-fill::after{content:'';position:absolute;right:-4px;top:-4px;bottom:-4px;width:14px;border-radius:50%;background:var(--c-yellow);border:2px solid var(--ink)}\n.q-num{font-weight:800;font-size:14px;white-space:nowrap;background:var(--ink);color:#fff;padding:6px 14px;border-radius:100px}\n.q-xp{display:flex;align-items:center;gap:4px;font-weight:700;font-size:12.5px;color:var(--c-red)}\n\n.q-card{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:26px 22px;box-shadow:var(--shadow-lg);margin-bottom:16px}\n@media(min-width:720px){.q-card{padding:36px 40px}}\n.q-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:800;border:2px solid var(--ink);margin-bottom:12px}\n.q-tag.dom-d{background:var(--c-red-soft);color:var(--c-red)}\n.q-tag.dom-b{background:var(--c-blue-soft);color:var(--c-blue)}\n.q-tag.dom-i{background:var(--c-green-soft);color:var(--c-green)}\n.q-tag.dom-t{background:var(--c-yellow-soft);color:#856A08}\n.q-tag.dom-_{background:#f0eee3;color:var(--ink)}\n\n.q-title{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:8px;letter-spacing:-.01em}\n.q-sub{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:20px}\n.q-tsc{font-size:11px;color:var(--ink-3);font-family:monospace;margin-bottom:18px;padding:6px 10px;background:var(--line-2);border-radius:6px;display:inline-block}\n\n/* rating (type:rate) — 5 cards */\n.rating{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}\n@media(min-width:600px){.rating{gap:10px}}\n.rate{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-sm);padding:14px 4px;text-align:center;transition:all .15s;box-shadow:var(--shadow-sm);min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}\n.rate:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.rate-n{font-size:22px;font-weight:800;line-height:1}\n.rate-dots{display:flex;gap:3px}\n.rate-dot{width:6px;height:6px;border-radius:50%;background:#ddd8c8}\n.rate.sel{background:var(--c-yellow);transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.rate.sel .rate-dot{background:var(--ink)}\n.rate-hint{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);margin-bottom:8px}\n\n/* scenario / pick — full-width option rows */\n.picks{display:flex;flex-direction:column;gap:10px}\n.pick{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-md);padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;box-shadow:var(--shadow-sm);transition:all .15s;width:100%}\n.pick:hover{transform:translateX(4px);box-shadow:var(--shadow-md);background:var(--c-yellow-soft)}\n.pick.sel{background:var(--c-yellow);transform:translateX(4px);box-shadow:var(--shadow-md)}\n.pick-letter{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:#f0eee3;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}\n.pick.sel .pick-letter{background:var(--c-red);color:#fff}\n.pick-txt{font-size:14px;font-weight:600;line-height:1.4;flex:1}\n\n/* quiz nav */\n.q-nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}\n.q-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;flex:1}\n.q-dot{width:8px;height:8px;border-radius:50%;background:#ddd8c8;border:1.5px solid var(--ink);transition:all .2s}\n.q-dot.done{background:var(--c-green)}\n.q-dot.now{background:var(--c-red);transform:scale(1.3)}\n\n/* xp pop */\n.xp-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--c-yellow);border:3px solid var(--ink);border-radius:100px;padding:12px 24px;font-weight:800;font-size:18px;box-shadow:var(--shadow-lg);z-index:200;pointer-events:none;animation:xp-pop 1s ease-out forwards}\n@keyframes xp-pop{\n  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}\n  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}\n  100%{opacity:0;transform:translate(-50%,-160%) scale(1)}\n}\n\n/* ══════════════════════════════════════════\n   RESULT / DASHBOARD\n══════════════════════════════════════════ */\n.result-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px}\n@media(min-width:980px){.result-grid{grid-template-columns:1.1fr .9fr}}\n\n.char-reveal{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);position:relative}\n.char-reveal-top{padding:28px 24px 20px;text-align:center;position:relative}\n.char-reveal-top::before,.char-reveal-top::after{content:'';position:absolute;width:60px;height:60px;border-radius:50%;opacity:.35}\n.char-reveal-top::before{top:-20px;left:-20px;background:#fff}\n.char-reveal-top::after{bottom:-20px;right:-20px;background:#fff}\n.char-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;opacity:.7}\n.char-name-big{font-size:32px;font-weight:800;line-height:1.1;margin-bottom:4px;letter-spacing:-.02em}\n.char-name-en{font-size:15px;opacity:.7;margin-bottom:4px;font-weight:600}\n.char-tag-small{font-size:13px;opacity:.85;font-weight:600}\n.char-illo-wrap{margin:8px 0 8px;display:flex;justify-content:center;position:relative}\n.char-illo-wrap svg{animation:bob 3s ease-in-out infinite}\n\n.char-body{padding:24px}\n.char-desc{font-size:14.5px;color:var(--ink-2);line-height:1.75;margin-bottom:20px}\n\n.slabel{font-size:13px;font-weight:800;margin:20px 0 10px;display:flex;align-items:center;gap:8px}\n.slabel:first-child{margin-top:0}\n.slabel-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--c-red);color:#fff;font-size:11px;font-weight:800}\n\n/* chips */\n.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}\n.chip{font-size:12px;font-weight:600;padding:5px 11px;border-radius:100px;border:2px solid var(--ink);background:var(--surface)}\n.chip.on{background:var(--c-yellow)}\n.chip.grow{background:var(--line-2)}\n\n/* ── Radar chart ── */\n.radar-card{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-lg)}\n.radar-wrap{display:flex;justify-content:center;align-items:center;padding:8px 0 12px}\n.radar-legend{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}\n.r-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--line-2);font-size:12.5px;font-weight:600}\n.r-swatch{width:12px;height:12px;border-radius:4px;border:1.5px solid var(--ink);flex-shrink:0}\n.r-score{margin-left:auto;font-weight:800}\n\n/* benchmark compare */\n.bench{margin-top:16px}\n.bench-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}\n.bench-lbl{font-size:12.5px;font-weight:700;width:92px;flex-shrink:0}\n.bench-bar{flex:1;position:relative;height:26px;background:var(--line-2);border:2px solid var(--ink);border-radius:100px;overflow:hidden}\n.bench-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--c-red),var(--c-yellow));transition:width 1s cubic-bezier(.4,0,.2,1)}\n.bench-mark{position:absolute;top:-5px;bottom:-5px;width:3px;background:var(--ink);border-radius:2px}\n.bench-mark::after{content:attr(data-l);position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9.5px;font-weight:800;white-space:nowrap;background:var(--ink);color:#fff;padding:2px 6px;border-radius:4px}\n.bench-val{font-weight:800;font-size:13px;width:38px;text-align:right}\n\n/* TSC list */\n.tsc-list{display:flex;flex-direction:column;gap:10px}\n.tsc-row{display:flex;align-items:center;gap:10px}\n.tsc-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink);flex-shrink:0}\n.tsc-name{flex:1;font-size:13px;font-weight:600}\n.tsc-lvl{display:flex;gap:2px}\n.tsc-step{width:16px;height:6px;border-radius:2px;background:var(--line-2);border:1px solid var(--ink)}\n.tsc-step.on{background:var(--c-red)}\n\n/* Career path */\n.path{display:flex;flex-direction:column;gap:0;position:relative;padding-left:8px}\n.path-step{display:flex;align-items:center;gap:14px;padding:10px 0;position:relative}\n.path-step::before{content:'';position:absolute;left:16px;top:34px;bottom:-10px;width:2px;background:var(--ink);opacity:.3}\n.path-step:last-child::before{display:none}\n.path-n{width:34px;height:34px;border-radius:50%;background:var(--c-yellow);border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;z-index:1}\n.path-step.now .path-n{background:var(--c-red);color:#fff;box-shadow:0 0 0 4px rgba(229,75,42,.15)}\n.path-info{flex:1}\n.path-role{font-size:14.5px;font-weight:700;line-height:1.3}\n.path-yr{font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:600}\n.path-step.now .path-yr::before{content:'คุณอยู่ที่นี่ · ';color:var(--c-red);font-weight:800}\n\n/* ══════════════════════════════════════════\n   LEARNING PATH\n══════════════════════════════════════════ */\n.lp-hero{background:var(--c-green);color:#fff;border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:28px 24px;box-shadow:var(--shadow-lg);margin-bottom:18px;position:relative;overflow:hidden}\n.lp-hero h2{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}\n.lp-hero p{font-size:14px;opacity:.95;max-width:460px;line-height:1.6}\n.lp-hero-illo{position:absolute;right:-10px;bottom:-30px;opacity:.9;display:none}\n@media(min-width:720px){.lp-hero-illo{display:block}}\n\n.tabs{display:flex;gap:6px;background:var(--surface);border:2px solid var(--ink);border-radius:100px;padding:4px;margin-bottom:16px;overflow-x:auto}\n.tab{flex:1;min-width:fit-content;padding:9px 16px;font-size:13px;font-weight:700;border-radius:100px;white-space:nowrap;transition:all .15s}\n.tab.on{background:var(--ink);color:#fff}\n\n.lp-grid{display:grid;grid-template-columns:1fr;gap:12px}\n@media(min-width:720px){.lp-grid{grid-template-columns:repeat(2,1fr)}}\n.lp-item{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-md);padding:18px;box-shadow:var(--shadow-sm);transition:transform .15s;display:flex;flex-direction:column;gap:12px}\n.lp-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.lp-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}\n.lp-kind{font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:100px;border:2px solid var(--ink);background:var(--c-yellow-soft);text-transform:uppercase;letter-spacing:.04em}\n.lp-save{width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}\n.lp-save.on{background:var(--c-red);color:#fff}\n.lp-title{font-size:15px;font-weight:700;line-height:1.35}\n.lp-meta{display:flex;gap:12px;font-size:12px;color:var(--ink-2);font-weight:600;margin-top:auto}\n.lp-meta span{display:flex;align-items:center;gap:4px}\n\n/* mentor cards */\n.mentor{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:14px;align-items:center}\n.mentor-ava{width:48px;height:48px;border-radius:50%;background:var(--c-blue-soft);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}\n.mentor-body{flex:1}\n.mentor-name{font-size:14px;font-weight:700}\n.mentor-role{font-size:12px;color:var(--ink-2);margin-top:2px}\n\n/* ══════════════════════════════════════════\n   30-60-90 Plan\n══════════════════════════════════════════ */\n.plan-head{text-align:center;margin-bottom:18px}\n.plan-head h2{font-size:28px;font-weight:800;letter-spacing:-.01em}\n.plan-head p{font-size:14px;color:var(--ink-2);margin-top:6px}\n\n.plan-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:16px}\n@media(min-width:860px){.plan-grid{grid-template-columns:repeat(3,1fr)}}\n.phase{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}\n.phase-bar{height:8px;margin:-22px -22px 18px;border-bottom:2.5px solid var(--ink)}\n.phase-1 .phase-bar{background:var(--c-green)}\n.phase-2 .phase-bar{background:var(--c-yellow)}\n.phase-3 .phase-bar{background:var(--c-red)}\n.phase-num{font-size:48px;font-weight:800;line-height:1;letter-spacing:-.04em;margin-bottom:4px}\n.phase-1 .phase-num{color:var(--c-green)}\n.phase-2 .phase-num{color:#856A08}\n.phase-3 .phase-num{color:var(--c-red)}\n.phase-title{font-size:14px;font-weight:800;margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em}\n.phase-list{display:flex;flex-direction:column;gap:10px}\n.phase-item{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.5}\n.phase-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--ink);flex-shrink:0;margin-top:2px;background:var(--surface);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}\n.phase-chk.on{background:var(--c-green);color:#fff}\n.phase-item.done .phase-txt{text-decoration:line-through;opacity:.55}\n\n/* ══════════════════════════════════════════\n   BADGES\n══════════════════════════════════════════ */\n.badges-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}\n@media(min-width:520px){.badges-grid{grid-template-columns:repeat(3,1fr)}}\n@media(min-width:820px){.badges-grid{grid-template-columns:repeat(4,1fr)}}\n.badge{background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-md);padding:18px 12px;text-align:center;box-shadow:var(--shadow-sm);position:relative;transition:transform .15s}\n.badge.locked{background:var(--line-2);opacity:.55}\n.badge.unlocked:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.badge-icon{font-size:36px;line-height:1;margin-bottom:8px;filter:grayscale(1)}\n.badge.unlocked .badge-icon{filter:none;animation:pop 2s ease-out}\n@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}\n.badge-name{font-size:13px;font-weight:800;margin-bottom:4px}\n.badge-desc{font-size:11px;color:var(--ink-2);line-height:1.4}\n.badge.unlocked::after{content:'✓';position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--c-green);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--ink)}\n\n/* ══════════════════════════════════════════\n   SHARE\n══════════════════════════════════════════ */\n.share-box{background:var(--ink);color:#fff;border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-lg);margin-bottom:16px}\n.share-box h3{font-size:18px;font-weight:800;margin-bottom:6px}\n.share-box p{font-size:13px;opacity:.8;margin-bottom:14px;line-height:1.6}\n.share-actions{display:flex;gap:8px;flex-wrap:wrap}\n.share-btn{padding:11px 16px;font-size:13px;font-weight:700;border-radius:100px;background:#fff;color:var(--ink);border:2px solid #fff;display:inline-flex;align-items:center;gap:8px;transition:all .15s}\n.share-btn:hover{transform:translateY(-1px)}\n.share-btn.yellow{background:var(--c-yellow);border-color:var(--c-yellow)}\n\n/* ══════════════════════════════════════════\n   TWEAKS PANEL\n══════════════════════════════════════════ */\n#tweaks{position:fixed;bottom:20px;right:20px;background:var(--surface);border:2.5px solid var(--ink);border-radius:20px;padding:16px;width:290px;box-shadow:var(--shadow-xl),var(--shadow-lg);z-index:100;display:none;max-height:80vh;overflow:auto;font-size:13px}\n#tweaks.on{display:block}\n#tweaks h4{font-size:13px;font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}\n#tweaks .tw-close{background:none;border:none;font-size:18px;cursor:pointer;line-height:1}\n#tweaks .tw-sub{font-size:11.5px;color:var(--ink-2);margin-bottom:12px}\n#tweaks .tw-group{margin-bottom:14px}\n#tweaks .tw-label{font-size:11.5px;font-weight:700;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)}\n#tweaks .tw-row{display:flex;gap:6px;flex-wrap:wrap}\n#tweaks .tw-opt{font-size:11.5px;padding:6px 12px;border-radius:100px;border:2px solid var(--ink);background:var(--surface);font-weight:600;cursor:pointer}\n#tweaks .tw-opt.on{background:var(--c-yellow)}\n#tweaks .tw-swatch{width:26px;height:26px;border-radius:8px;border:2px solid var(--ink);cursor:pointer;position:relative}\n#tweaks .tw-swatch.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;text-shadow:0 1px 0 rgba(0,0,0,.4)}\n\n/* ══════════════════════════════════════════\n   THEMES\n══════════════════════════════════════════ */\nbody.theme-dark{\n  --bg:#1A1A18;\n  --surface:#262622;\n  --ink:#F5F1E8;\n  --ink-2:#B8B3A3;\n  --ink-3:#757268;\n  --line:#3A3830;\n  --line-2:#2E2C26;\n}\nbody.theme-dark .btn.ghost:hover{background:var(--line-2)}\nbody.theme-dark .bench-mark::after{color:var(--ink);background:var(--bg)}\nbody.theme-dark .q-tsc{color:var(--ink-3)}\n\nbody.theme-retro{\n  --bg:#F9E4B7;\n  --c-red:#D63D22;\n  --c-yellow:#F2B600;\n  --c-green:#4E9B3C;\n  --c-blue:#1E3C97;\n}\n\nbody.theme-mono{\n  --c-red:#333;\n  --c-blue:#555;\n  --c-green:#444;\n  --c-yellow:#D4D4D4;\n  --c-red-soft:#ececec;\n  --c-blue-soft:#f0f0f0;\n  --c-green-soft:#eaeaea;\n  --c-yellow-soft:#f5f5f5;\n}\n\n/* compact mode */\nbody.compact .hero{padding:28px 22px}\nbody.compact .q-card{padding:22px 18px}\nbody.compact .stats{grid-template-columns:repeat(4,1fr)}\n\n/* footer */\n.footer{text-align:center;padding:26px 20px;color:var(--ink-3);font-size:12px;line-height:1.7}\n.footer strong{color:var(--ink-2)}\n\n/* tiny emoji helpers */\n.em{font-style:normal}\n\n/* backdrop for modals (guide) */\n.modal-back{display:none;position:fixed;inset:0;background:rgba(26,26,24,.4);z-index:50;backdrop-filter:blur(4px)}\n.modal-back.on{display:block}\n.modal{display:none;position:fixed;inset:20px;max-width:640px;margin:0 auto;background:var(--surface);border:2.5px solid var(--ink);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-xl);z-index:55;overflow:auto}\n.modal.on{display:block}\n@media(min-width:720px){.modal{inset:40px auto;top:40px;bottom:40px;left:50%;transform:translateX(-50%);width:640px}}\n\n/* skeleton for future data */\n.skel{background:linear-gradient(90deg,var(--line-2) 25%,var(--line) 50%,var(--line-2) 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:6px;height:16px}\n@keyframes skel{0%{background-position:-200% 0}100%{background-position:200% 0}}\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n\n  <!-- TOP NAV -->\n  <nav class=\"nav\">\n    <div class=\"nav-brand\">\n      <div class=\"nav-logo\">🎨<\u002Fdiv>\n      <span>SFwD Youth Skills Explorer<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"nav-actions\">\n      <span id=\"lvl-pill\" class=\"lvl-pill\"><span class=\"lvl-badge\">1<\u002Fspan><span>0 XP<\u002Fspan><\u002Fspan>\n      <button id=\"nav-dash\" class=\"nav-btn\" onclick=\"show('s-result')\" style=\"display:none\">Dashboard<\u002Fbutton>\n      <button class=\"nav-btn\" onclick=\"show('s-guide')\">คู่มือ<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ════════ INTRO ════════ -->\n  <div id=\"s-intro\" class=\"screen active\" data-screen-label=\"01 Intro\">\n    <div class=\"hero\">\n      <div class=\"hero-grid\">\n        <div>\n          <span class=\"hero-eyebrow\"><span class=\"dot\"><\u002Fspan> SFwD 2.0 · Proof of Concept<\u002Fspan>\n          <h1>ค้นพบ<br><span class=\"hl\">ตัวละครนักออกแบบ<\u002Fspan><br>ของคุณ<\u002Fh1>\n          <p class=\"hero-sub\">ระบบวิเคราะห์สมรรถนะสำหรับเยาวชนอายุ 15-24 ปี อิงกรอบ Skills Framework for Design 2.0 ของสิงคโปร์ ตอบ 18 คำถาม ได้ตัวละคร + แผนพัฒนา 30-60-90 วัน + Learning Path ส่วนตัว<\u002Fp>\n          <div class=\"hero-cta\">\n            <button class=\"btn primary\" onclick=\"startQuiz()\">เริ่มทำแบบทดสอบ ✨<\u002Fbutton>\n            <butt
